# Host nginx for pmis.kisumu.go.ke → IMES Docker (see docker-compose.prod.yml: 8080 HTTP, 8443 HTTPS).
# After editing: ./deploy/sync-nginx-pmis-with-vps.sh push

# HTTP: Let’s Encrypt must reach /.well-known/ on port 80 — do not redirect that path to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name pmis.kisumu.go.ke;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pmis.kisumu.go.ke;

    ssl_certificate     /etc/letsencrypt/live/pmis.kisumu.go.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pmis.kisumu.go.ke/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    location / {
        # Proxy to Docker nginx HTTPS (inner app redirects pmis HTTP→HTTPS; use :8443 not :8080 to avoid loops).
        proxy_pass https://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
