# Production Docker Compose Configuration
# Secrets: set in a root `.env` file (see `.env.example`). Docker Compose loads `.env` for ${VAR} substitution.
# Do not commit `.env`.

services:
  nginx_proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    # Published HTTP/HTTPS for legacy and county: avoid host :80/:443 conflicts (use reverse proxy if needed).
    ports:
      - "${NGINX_HTTPS_PORT:-8443}:443"
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx-production.conf:/etc/nginx/nginx.conf
      # Per-server: deploy script copies https-ecimes.conf or https-pmis.conf → https-site.conf before compose up.
      - ./nginx/https-site.conf:/etc/nginx/conf.d/https-site.conf
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - api
      - public-dashboard
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: react_frontend
    restart: unless-stopped
    # No need to expose port externally, nginx will proxy to it
    expose:
      - "80"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: node_api
    expose:
      - "3000"
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      mysql_db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: mysql_db
      DB_USER: ${MYSQL_USER:-impesUser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-Admin2010impes}
      DB_NAME: ${MYSQL_DATABASE:-imbesdb}
    command: npm run dev
    restart: unless-stopped

  public-dashboard:
    build:
      context: ./public-dashboard
      dockerfile: Dockerfile.production
    container_name: public_dashboard
    restart: unless-stopped
    expose:
      - "80"
    # Direct access (same on legacy and county); main citizen UI is still via nginx /citizen/
    ports:
      - "${PUBLIC_DASHBOARD_PORT:-5174}:80"

  mysql_db:
    image: mysql:8.0
    container_name: db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-imbesdb}
      MYSQL_USER: ${MYSQL_USER:-impesUser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Admin2010impes}
    volumes:
      - ./api/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:
  nginx_cache:
