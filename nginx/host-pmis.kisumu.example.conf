# Example: host nginx on the VPS (NOT inside Docker).
# Install: sudo cp to /etc/nginx/sites-available/pmis && sudo ln -sf ../sites-available/pmis /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx
#
# IMES Docker maps: 8080→container:80, 8443→container:443.
# Proxy to https://127.0.0.1:8443 (not :8080): inner nginx redirects pmis HTTP→HTTPS;
# proxying only HTTP to :8080 can cause a redirect loop in the browser.
# Cert paths: host uses Let's Encrypt below; container still has its own certs for :8443 (often self-signed) —
# proxy_ssl_verify off is required for localhost.

# --- HTTP: ACME + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name pmis.kisumu.go.ke;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: terminate TLS on host, proxy to Docker nginx ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pmis.kisumu.go.ke;

    ssl_certificate     /etc/letsencrypt/live/pmis.kisumu.go.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pmis.kisumu.go.ke/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location / {
        proxy_pass https://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
