worker_processes auto;
events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    client_body_buffer_size 128k;
    client_header_buffer_size 16k;
    large_client_header_buffers 8 32k;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # HTTP→HTTPS for ecimes/pmis, but never redirect /.well-known/acme-challenge/ (Let's Encrypt HTTP-01).
    # Plain "if ($host) return 301" ran before the challenge could be served and/or forced HTTPS 404.
    map "$host:$request_uri" $do_https_redirect {
        default 0;
        "~^ecimes\.kisumu\.go\.ke:/\.well-known/acme-challenge/" 0;
        "~^pmis\.kisumu\.go\.ke:/\.well-known/acme-challenge/" 0;
        "~^ecimes\.kisumu\.go\.ke:" 1;
        "~^pmis\.kisumu\.go\.ke:" 1;
    }

    # Resolver for Docker DNS (optional; static upstream names usually resolve at start)
    server {
        listen 80 default_server;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }

        if ($do_https_redirect = 1) {
            return 301 https://$host$request_uri;
        }

        # --- Admin SPA (main React app) ---
        location /admin/ {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache my_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location = /admin {
            return 301 /admin/;
        }

        # --- Citizen / public dashboard SPA ---
        location /citizen/ {
            proxy_pass http://public-dashboard:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass 1;
            proxy_no_cache 1;
        }

        location = /citizen {
            return 301 /citizen/;
        }

        # --- API ---
        location /api/ {
            proxy_pass http://api:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /socket.io/ {
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /uploads/ {
            proxy_pass http://api:3000/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache my_cache;
            proxy_cache_valid 200 7d;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Legacy bookmarks (/impes → /admin)
        location = /impes {
            return 301 /admin/;
        }
        location ^~ /impes/ {
            rewrite ^/impes/(.*)$ /admin/$1 permanent;
        }

        location = / {
            return 301 /admin/;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
